<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>かなとくんのおべんきょう 🌟</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

/* ── RESET & ROOT ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --add:#FF6B35;--add-l:#FFE8DF;
  --sub:#5865F2;--sub-l:#E8EAFF;
  --eng:#0BAB64;--eng-l:#D4F5E8;
  --kan:#F4A100;--kan-l:#FFF5D6;
  --clk:#8E24AA;--clk-l:#F3E5F5;
  --bg:#FFFBF0;
  --text:#3D2B00;
  --shadow:0 6px 24px rgba(0,0,0,.12);
  --r:20px;
}
body{font-family:'Zen Maru Gothic','Hiragino Maru Gothic Pro',sans-serif;
     background:var(--bg);min-height:100vh;overflow-x:hidden;color:var(--text)}

/* ── ANIMATIONS ── */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes popIn{from{opacity:0;transform:scale(.4) rotate(-8deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes bigPop{0%{opacity:0;transform:scale(.1)}40%{transform:scale(1.35)}65%{transform:scale(.95)}80%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(540deg);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes correctFlash{0%,100%{background:white}30%{background:#E8F5E9}70%{background:#E8F5E9}}
@keyframes drift{from{transform:translateY(110vh)}to{transform:translateY(-10vh)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── BUBBLES ── */
#bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bub{position:absolute;border-radius:50%;opacity:.14;animation:drift linear infinite}

/* ── SCREENS ── */
.scr{display:none;position:relative;z-index:1;min-height:100vh}
.scr.on{display:block}

/* ── HEADER ── */
#hdr{position:sticky;top:0;z-index:100;
     background:linear-gradient(135deg,#FF8C42,#FF6B35);
     padding:12px 18px 10px;
     display:flex;align-items:center;justify-content:space-between;
     box-shadow:0 3px 16px rgba(255,107,53,.4)}
#hdr-title{font-size:20px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:.5px}
#hdr-star{background:rgba(255,255,255,.25);border-radius:999px;
          padding:5px 14px;color:#fff;font-size:14px;font-weight:700}

/* ── HOME ── */
#home-wrap{padding:20px 16px 60px}
.hero{text-align:center;margin-bottom:26px}
#hero-emoji{font-size:72px;display:block;animation:float 2.4s ease-in-out infinite}
.hero-name{font-size:22px;font-weight:900;color:var(--text);margin-top:8px}
.hero-sub{font-size:13px;color:#8D6E63;margin-top:3px}

.grid4{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.card{border-radius:var(--r);padding:22px 12px;text-align:center;
      cursor:pointer;box-shadow:var(--shadow);border:3px solid transparent;
      transition:transform .18s,box-shadow .18s;position:relative;overflow:hidden}
.card:active{transform:scale(.95)}
.card:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 12px 36px rgba(0,0,0,.18)}
.card-ic{font-size:46px;display:block;margin-bottom:8px}
.card-name{font-size:19px;font-weight:900}
.card-hint{font-size:11px;margin-top:3px;opacity:.7}
.c-add{background:linear-gradient(135deg,var(--add-l),#FFCCB3);border-color:var(--add)}.c-add .card-name{color:var(--add)}
.c-sub{background:linear-gradient(135deg,var(--sub-l),#C5C9FF);border-color:var(--sub)}.c-sub .card-name{color:var(--sub)}
.c-eng{background:linear-gradient(135deg,var(--eng-l),#9EECC8);border-color:var(--eng)}.c-eng .card-name{color:var(--eng)}
.c-kan{background:linear-gradient(135deg,var(--kan-l),#FFE09A);border-color:var(--kan)}.c-kan .card-name{color:var(--kan)}
.c-clk{background:linear-gradient(135deg,var(--clk-l),#CE93D8);border-color:var(--clk);grid-column:1/-1}.c-clk .card-name{color:var(--clk)}
.clock-svg-wrap{margin:6px auto 4px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.15))}


#home-score-wrap{margin-top:20px;background:rgba(255,255,255,.65);
                 border-radius:16px;padding:14px;text-align:center;
                 font-size:14px;font-weight:700;color:var(--text);display:none}

/* ── LEVEL SELECT ── */
#lv-wrap{padding:16px 16px 60px}
.lv-head{text-align:center;margin-bottom:22px}
.lv-title{font-size:24px;font-weight:900}
.lv-sub{font-size:13px;opacity:.6;margin-top:3px}
.lv-list{display:flex;flex-direction:column;gap:12px}
.lv-btn{display:flex;align-items:center;gap:14px;
        background:#fff;border:3px solid transparent;border-radius:18px;
        padding:16px 18px;cursor:pointer;box-shadow:var(--shadow);
        font-family:inherit;text-align:left;width:100%;
        transition:transform .15s,box-shadow .15s}
.lv-btn:hover{transform:translateX(4px) scale(1.02);box-shadow:0 10px 28px rgba(0,0,0,.15)}
.lv-btn:active{transform:scale(.97)}
.lv-n{font-size:28px;font-weight:900;min-width:42px;text-align:center}
.lv-info{flex:1}
.lv-name{font-size:15px;font-weight:900}
.lv-desc{font-size:11px;opacity:.68;margin-top:2px}
.lv-stars{font-size:16px;letter-spacing:1px}

/* ── QUIZ ── */
#qz-wrap{padding:12px 16px 60px}
.qz-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.qz-prog{flex:1}
.prog-bar{height:11px;background:rgba(0,0,0,.09);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;transition:width .4s ease;background:var(--add)}
.prog-txt{font-size:11px;text-align:center;margin-top:3px;font-weight:700;opacity:.65}
.qz-pts{font-size:13px;font-weight:700;opacity:.7;white-space:nowrap}

/* Quiz card */
.qcard{background:#fff;border-radius:26px;padding:24px 18px 20px;
       box-shadow:var(--shadow);text-align:center;
       min-height:260px;display:flex;flex-direction:column;
       align-items:center;justify-content:center;
       margin-bottom:14px;position:relative;overflow:hidden}
.qcard::before{content:'';position:absolute;top:0;left:0;right:0;height:7px;background:var(--add)}
.q-label{font-size:14px;font-weight:700;opacity:.62;margin-bottom:10px}
.q-main{font-size:78px;line-height:1.1;font-weight:900;margin-bottom:7px;
        min-height:90px;display:flex;align-items:center;justify-content:center}
.q-sub{font-size:18px;opacity:.68;margin-bottom:5px;font-weight:700}
.q-math{font-size:52px;font-weight:900;letter-spacing:3px;margin:6px 0}
.q-story{font-size:17px;font-weight:700;line-height:1.7;color:#4A148C;
         background:#F3E5F5;border-radius:14px;padding:13px 15px;
         width:100%;text-align:left}
.q-dots{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:4px 0;min-height:26px}
.speak-btn{background:linear-gradient(135deg,#E3F2FD,#BBDEFB);
           border:2px solid #90CAF9;border-radius:999px;
           padding:6px 16px;font-size:13px;font-weight:700;
           cursor:pointer;font-family:inherit;
           display:inline-flex;align-items:center;gap:5px;
           transition:transform .12s;margin-top:8px}
.speak-btn:hover{transform:scale(1.07)}
.hint-btn{background:linear-gradient(135deg,#FFF9C4,#FFF59D);
          border:2px solid var(--kan);border-radius:999px;
          padding:6px 14px;font-size:13px;font-weight:700;
          cursor:pointer;font-family:inherit;
          display:inline-flex;align-items:center;gap:4px;
          transition:transform .12s;margin-top:8px;margin-left:6px}
.hint-btn:hover{transform:scale(1.07)}

/* Hint / Sakuranbo */
.hint-box{width:100%;margin-top:12px;display:none;animation:fadeUp .3s ease}
.hint-box.show{display:block}
.skb{padding:8px 4px 2px;font-family:inherit}
.skb-title{font-size:13px;font-weight:900;text-align:center;color:#5D4037;margin-bottom:8px}
.skb-step{background:#fff;border-radius:13px;padding:10px 12px;
          margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.07);
          border-left:4px solid var(--add)}
.skb-step.s{border-left-color:var(--sub)}
.skb-stitle{font-size:11px;font-weight:900;opacity:.58;margin-bottom:5px}
.skb-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center}
.skb-num{font-size:26px;font-weight:900}
.skb-op{font-size:20px;font-weight:900;color:#666}
.skb-c{display:inline-flex;align-items:center;justify-content:center;
        width:36px;height:36px;border-radius:50%;font-size:15px;font-weight:900}
.skb-cr{background:#FFCDD2;color:#C62828;border:2px solid #EF9A9A}
.skb-cb{background:#BBDEFB;color:#1565C0;border:2px solid #90CAF9}
.skb-cg{background:#C8E6C9;color:#2E7D32;border:2px solid #A5D6A7}
.skb-co{background:#FFE0B2;color:#E65100;border:2px solid #FFCC80}
.skb-hl{font-size:28px;font-weight:900;color:var(--add);
         background:#FFF9C4;border-radius:8px;padding:1px 8px}
.skb-hl.s{color:var(--sub)}
@keyframes sc-appear{from{opacity:0;transform:scale(.2)}to{opacity:1;transform:scale(1)}}
.sc-anim{animation:sc-appear .35s ease forwards;opacity:0}
.blk-row{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;margin:4px 0}
.blk{width:19px;height:19px;border-radius:3px}
/* さくらんぼブロック色 */
.blk-ten{background:#42A5F5;border:1px solid #1565C0}       /* 青：10のまとまり */
.blk-one{background:#FFA726;border:1px solid #E65100}       /* オレンジ：一の位のあまり */
.blk-need{background:#EF5350;border:1px solid #C62828}      /* 赤：10にするために足す数 */
.blk-rest{background:#7E57C2;border:1px solid #4527A0}      /* 紫：たしざんのあまり */
.blk-result{background:#66BB6A;border:1px solid #2E7D32}    /* 緑：計算結果 */
.blk-used{background:#ccc;border:1px solid #aaa;opacity:.3} /* グレー：引いた分 */

/* Choices */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ch{background:#fff;border:3px solid #E0E0E0;border-radius:17px;
    padding:14px 8px;font-size:19px;font-weight:700;font-family:inherit;
    cursor:pointer;text-align:center;
    box-shadow:0 4px 12px rgba(0,0,0,.07);
    min-height:58px;display:flex;align-items:center;justify-content:center;
    transition:transform .12s,border-color .15s,background .15s}
.ch:hover{transform:scale(1.05)}
.ch:active{transform:scale(.95)}
.ch.ok{background:#E8F5E9!important;border-color:#66BB6A!important;animation:correctFlash .4s ease}
.ch.ng{background:#FFEBEE!important;border-color:#EF9A9A!important;animation:shake .4s ease}
.ch.dim{opacity:.32;cursor:default}

/* Kanji extra info */
.kan-extra{display:none;width:100%;margin-top:10px;
           background:linear-gradient(135deg,#FFF9C4,#FFF8E1);
           border:2px solid #FFE082;border-radius:14px;
           padding:12px 14px;font-size:13px;font-weight:700;
           color:#5D4037;text-align:left;animation:fadeUp .4s ease}
.kan-extra.show{display:block}

/* ── FEEDBACK POPUP ── */
#fb{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
    z-index:400;pointer-events:none;text-align:center;white-space:nowrap}
@keyframes fbAnim{0%{opacity:0;transform:translateY(8px) scale(.8)}
  18%{opacity:1;transform:translateY(0) scale(1)}
  72%{opacity:1}100%{opacity:0;transform:translateY(-20px)}}
.fb-bub{display:inline-block;background:#fff;border-radius:18px;
        padding:9px 22px;font-size:21px;font-weight:900;
        box-shadow:var(--shadow);animation:fbAnim 1.9s ease forwards}

/* ── BIG EMOJI POP ── */
#epop{position:fixed;z-index:450;
      display:none;align-items:center;justify-content:center;
      pointer-events:none}
#epop.on{display:flex}
#epop-inner{font-size:110px;line-height:1;animation:bigPop 2.8s ease forwards}

/* 漢字専用：説明文と被らないよう上部に表示 */
#epop.kan-mode{top:60px;left:0;right:0;bottom:auto;align-items:flex-start;}

/* ── RESULT ── */
#res{position:fixed;inset:0;z-index:500;
     display:none;align-items:center;justify-content:center;padding:18px}
#res.on{display:flex}
.res-bg{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(5px)}
.res-box{position:relative;background:#fff;border-radius:28px;
         padding:36px 26px 28px;text-align:center;
         box-shadow:0 20px 60px rgba(0,0,0,.3);
         max-width:340px;width:100%;animation:fadeUp .4s cubic-bezier(.34,1.56,.64,1)}
.res-emo{font-size:78px;line-height:1;margin-bottom:10px}
.res-title{font-size:27px;font-weight:900;margin-bottom:5px}
.res-sub{font-size:14px;opacity:.65;margin-bottom:16px}
.res-stars{font-size:34px;margin-bottom:14px;letter-spacing:4px}
.res-score{font-size:48px;font-weight:900}
.res-score span{font-size:22px}
.res-score-sub{font-size:13px;opacity:.6;margin-bottom:22px}
.res-btns{display:flex;gap:10px;justify-content:center}
.res-btn{border-radius:999px;padding:12px 26px;font-size:15px;
         font-weight:900;font-family:inherit;cursor:pointer;border:none;
         transition:transform .12s}
.res-btn:hover{transform:scale(1.06)}
.res-p{background:linear-gradient(135deg,#FF8C42,#FF6B35);color:#fff;
       box-shadow:0 6px 20px rgba(255,107,53,.4)}
.res-s{background:#F0F0F0;color:#555}

/* ── BACK BTN ── */
.back{background:#fff;border:2px solid #E0E0E0;border-radius:999px;
      padding:7px 16px;font-size:13px;font-weight:700;font-family:inherit;
      cursor:pointer;display:inline-flex;align-items:center;gap:4px;
      box-shadow:0 2px 8px rgba(0,0,0,.07);transition:transform .12s}
.back:hover{transform:scale(1.05)}

/* ── CONFETTI ── */
.cf{position:fixed;pointer-events:none;z-index:600;
    animation:confettiFall linear forwards;border-radius:3px}

@media(max-width:380px){.q-main{font-size:62px}.q-math{font-size:40px}.ch{font-size:17px}}

/* ── GUGUGAGA PENGUIN ── */
@keyframes guguFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-13px) rotate(3deg)}}
@keyframes guguWaddle{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
@keyframes guguRun{0%{left:-90px}100%{left:calc(100vw + 90px)}}
@keyframes eyeSparkle{0%,100%{opacity:.7}50%{opacity:1;filter:drop-shadow(0 0 5px #fff)}}
@keyframes heartPop{0%{opacity:0;transform:translateY(0) scale(0)}50%{opacity:1;transform:translateY(-18px) scale(1.2)}100%{opacity:0;transform:translateY(-34px) scale(.8)}}
.gugu-fixed{position:fixed;z-index:350;pointer-events:none;bottom:6px}
.gugu-fixed.left{left:4px}
.gugu-fixed.right{right:4px}
.gugu-mascot{animation:guguFloat 2.8s ease-in-out infinite;cursor:pointer;pointer-events:all;filter:drop-shadow(0 5px 12px rgba(0,0,0,.18))}
.gugu-runner{position:fixed;bottom:4px;z-index:340;pointer-events:none;animation:guguRun 5s linear forwards}
.gugu-speech{position:fixed;z-index:360;
  background:linear-gradient(135deg,#fff9fb,#f0faff);
  border:3px solid #ffb3d1;border-radius:18px 18px 18px 4px;
  padding:8px 14px;font-size:13px;font-weight:900;color:#666;
  white-space:nowrap;box-shadow:0 4px 16px rgba(255,150,200,.35);
  display:none;animation:fadeUp .3s ease}
.gugu-speech::before{content:'';position:absolute;bottom:-12px;left:12px;border:6px solid transparent;border-top-color:#ffb3d1}
.gugu-speech::after{content:'';position:absolute;bottom:-9px;left:13px;border:5px solid transparent;border-top-color:#fff9fb}
.gugu-heart{position:fixed;z-index:361;pointer-events:none;font-size:18px;animation:heartPop .9s ease forwards}
/* BGM button */
#bgm-btn{position:fixed;top:58px;right:12px;z-index:300;
  background:linear-gradient(135deg,#ffb3d1,#c084fc);
  color:white;border:none;border-radius:999px;
  padding:6px 14px;font-size:13px;font-weight:700;font-family:inherit;
  cursor:pointer;box-shadow:0 4px 14px rgba(192,132,252,.4);
  display:flex;align-items:center;gap:5px;transition:transform .12s}
#bgm-btn:hover{transform:scale(1.07)}

/* ── 学習記録 ── */
#study-record{margin-top:18px;background:rgba(255,255,255,.7);border-radius:20px;padding:16px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.rec-title{font-size:16px;font-weight:900;color:#5D4037;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rec-card{background:white;border-radius:14px;padding:10px 12px;border:2px solid #E0E0E0}
.rec-mode{font-size:12px;font-weight:900;opacity:.7;margin-bottom:4px}
.rec-lv{font-size:15px;font-weight:900}
.rec-bar-wrap{height:7px;background:#E0E0E0;border-radius:999px;margin-top:5px;overflow:hidden}
.rec-bar{height:100%;border-radius:999px;transition:width .6s ease}
.rec-detail{font-size:11px;opacity:.65;margin-top:3px}



/* ── スタート画面 ── */
#start-screen{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;
  transition:background 1s ease;
}
/* 朝(5〜10時): 明るいオレンジ〜ピンク */
#start-screen.time-morning{
  background:linear-gradient(160deg,#FF8C42 0%,#FFD580 40%,#FFF4CC 100%);
}
/* 昼(10〜17時): 空色〜水色 */
#start-screen.time-day{
  background:linear-gradient(160deg,#29B6F6 0%,#81D4FA 40%,#E1F5FE 100%);
}
/* 夕方(17〜20時): 夕焼けオレンジ〜赤紫 */
#start-screen.time-evening{
  background:linear-gradient(160deg,#FF5722 0%,#FF8A65 40%,#FFD54F 100%);
}
/* 夜(20〜5時): 深い紺〜紫 */
#start-screen.time-night{
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 100%);
}
@keyframes startPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes startFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
.start-star{position:absolute;font-size:18px;animation:twinkle ease-in-out infinite}
.start-char{font-size:96px;line-height:1;animation:startFloat 2.5s ease-in-out infinite;margin-bottom:16px}
.start-title{font-size:28px;font-weight:900;color:white;margin-bottom:8px;letter-spacing:1px}
.start-sub{font-size:16px;color:rgba(255,255,255,.7);margin-bottom:40px}
.start-btn{
  background:linear-gradient(135deg,#FF6B35,#FF8F00);
  color:white;border:none;border-radius:999px;
  padding:18px 48px;font-size:20px;font-weight:900;
  font-family:inherit;cursor:pointer;
  box-shadow:0 8px 30px rgba(255,107,53,.5);
  animation:startPulse 1.8s ease-in-out infinite;
}
.start-gugu{font-size:14px;font-weight:700;color:rgba(255,180,220,.8);margin-top:18px}

/* ── さくらんぼ計算アニメ ── */
@keyframes skbFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes skbBounce{0%{transform:scale(0.3)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes skbSlide{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes skbGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,0)}50%{box-shadow:0 0 0 6px rgba(255,107,53,0.3)}}
@keyframes skbLineGrow{from{stroke-dashoffset:100}to{stroke-dashoffset:0}}
.skb-step-anim{opacity:0}
.skb-step-anim.show{animation:skbFadeIn .4s ease forwards}
.skb-num-pop{display:inline-block;animation:skbBounce .5s ease forwards}
.skb-arrow-anim{opacity:0;animation:skbSlide .3s ease forwards}
.skb-result-glow{animation:skbGlow 1s ease 2}
.skb-block-wrap{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin:6px 0;min-height:28px}
.skb-block{width:22px;height:22px;border-radius:4px;opacity:0;transform:scale(0);transition:opacity .15s,transform .15s}
.skb-block.show{opacity:1;transform:scale(1)}
.skb-block-ten{background:#FF7043;border:2px solid #E64A19}
.skb-block-add{background:#FFF9C4;border:2px solid #F9A825}
.skb-block-result{background:#C8E6C9;border:2px solid #66BB6A}


/* ══════════════════════════════════════════

/* ホームの卵ウィジェット */
#egg-widget{
  margin:18px 0 0;
  background:linear-gradient(135deg,rgba(255,255,255,.85),rgba(255,249,220,.9));
  border-radius:22px;padding:16px 14px 14px;
  box-shadow:0 4px 18px rgba(0,0,0,.10);
  border:2px solid rgba(255,200,80,.4);
  text-align:center;
}
.egg-title{
  font-size:15px;font-weight:900;color:#5D4037;
  margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px;
}
.egg-stage-wrap{
  display:flex;align-items:center;justify-content:center;gap:18px;
  margin-bottom:10px;
}
/* SVG卵コンテナ */
#egg-svg-wrap{
  cursor:pointer;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.18));
  transition:transform .12s;
  display:inline-block;
}
#egg-svg-wrap:active{transform:scale(.93);}
@keyframes eggWobble{
  0%{transform:rotate(0deg)}
  20%{transform:rotate(-14deg)}
  40%{transform:rotate(14deg)}
  60%{transform:rotate(-8deg)}
  80%{transform:rotate(8deg)}
  100%{transform:rotate(0deg)}
}
#egg-svg-wrap.wobble{animation:eggWobble .55s ease;}

/* 卵ゲージ */
.egg-bar-wrap{
  width:100%;background:#EDE7F6;border-radius:999px;
  height:12px;overflow:hidden;margin:6px 0 4px;
}
.egg-bar-fill{
  height:100%;border-radius:999px;
  background:linear-gradient(90deg,#FFB300,#FF6B35);
  transition:width .5s ease;
}
.egg-bar-label{
  font-size:12px;font-weight:700;color:#8D6E63;text-align:center;
}

/* 卵割れ演出ポップアップ */
#egg-hatch-popup{
  position:fixed;inset:0;z-index:700;
  display:none;align-items:center;justify-content:center;
  padding:20px;
}
#egg-hatch-popup.show{display:flex;}
.ehp-bg{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);}
.ehp-box{
  position:relative;background:linear-gradient(135deg,#FFF9C4,#FFF3E0);
  border-radius:30px;padding:36px 28px 30px;
  text-align:center;max-width:320px;width:100%;
  box-shadow:0 24px 70px rgba(0,0,0,.35);
  animation:ehpPop .6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes ehpPop{
  from{opacity:0;transform:scale(.3) rotate(-15deg)}
  to{opacity:1;transform:scale(1) rotate(0)}
}
.ehp-title{font-size:26px;font-weight:900;color:#F57F17;margin-bottom:6px;}
.ehp-sub{font-size:14px;opacity:.7;margin-bottom:16px;}
.ehp-char{font-size:96px;line-height:1;display:block;margin:8px 0;
  animation:ehpCharIn .8s cubic-bezier(.34,1.56,.64,1) .3s both;}
@keyframes ehpCharIn{
  from{opacity:0;transform:scale(0) rotate(20deg)}
  to{opacity:1;transform:scale(1) rotate(0)}
}
.ehp-name{font-size:20px;font-weight:900;color:#5D4037;margin-top:6px;}
.ehp-msg{font-size:13px;opacity:.7;margin:6px 0 22px;}
.ehp-btn{
  background:linear-gradient(135deg,#FF6B35,#FF8F00);
  color:white;border:none;border-radius:999px;
  padding:14px 36px;font-size:17px;font-weight:900;
  cursor:pointer;font-family:inherit;
  box-shadow:0 6px 22px rgba(255,107,53,.45);
}

/* コレクション */
#egg-collection{
  margin-top:10px;
}
.ecol-title{
  font-size:13px;font-weight:900;color:#8D6E63;
  margin-bottom:8px;text-align:left;
  display:flex;align-items:center;gap:5px;
}
.ecol-grid{
  display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-start;
}
.ecol-item{
  width:46px;height:56px;
  border-radius:14px;
  background:rgba(255,255,255,.8);
  border:2px solid #E0D0A0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:26px;line-height:1;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  cursor:pointer;
  transition:transform .15s;
  position:relative;
}
.ecol-item:hover{transform:scale(1.12);}
.ecol-item.locked{
  background:rgba(220,220,220,.5);
  filter:grayscale(1);
  border-color:#ccc;
}
.ecol-item .ecol-no{
  font-size:9px;font-weight:900;color:#bbb;
  position:absolute;top:3px;right:5px;
}

/* 時間帯による卵の光彩 */
.egg-glow-morning{ filter:drop-shadow(0 0 12px rgba(255,180,50,.7)) drop-shadow(0 6px 14px rgba(0,0,0,.18)); }
.egg-glow-day    { filter:drop-shadow(0 0 12px rgba(80,180,255,.7)) drop-shadow(0 6px 14px rgba(0,0,0,.18)); }
.egg-glow-evening{ filter:drop-shadow(0 0 12px rgba(255,100,50,.7)) drop-shadow(0 6px 14px rgba(0,0,0,.18)); }
.egg-glow-night  { filter:drop-shadow(0 0 12px rgba(150,80,255,.7)) drop-shadow(0 6px 14px rgba(0,0,0,.18)); }

// ============================================================
// UTILITIES
// ============================================================
const $=id=>document.getElementById(id);
const rn=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=rn(0,i);[b[i],b[j]]=[b[j],b[i]]}return b}
function scr(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));$(id).classList.add('on')}

const JN=["れい","いち","に","さん","よん","ご","ろく","なな","はち","きゅう","じゅう",
  "じゅういち","じゅうに","じゅうさん","じゅうよん","じゅうご","じゅうろく","じゅうなな",
  "じゅうはち","じゅうきゅう","にじゅう"];
const nj=n=>JN[n]||String(n);

// ============================================================
// BG BUBBLES
// ============================================================
(()=>{
  const cols=["#FFCDD2","#F8BBD9","#E1BEE7","#C5CAE9","#BBDEFB","#B2DFDB","#DCEDC8","#FFF9C4","#FFE0B2"];
  const w=$('bubbles');
  for(let i=0;i<14;i++){
    const d=document.createElement('div');d.className='bub';
    const s=rn(40,110);
    d.style.cssText=`width:${s}px;height:${s}px;background:${cols[i%cols.length]};left:${rn(0,93)}%;animation-duration:${rn(12,26)}s;animation-delay:-${rn(0,22)}s`;
    w.appendChild(d);
  }
})();

// ============================================================
// ENGLISH DATA — 108 words (Lv1:25, Lv2:36, Lv3:47)
// ============================================================
const ENG={
  1:[ /* 数字10 + 色10 + 形5 = 25 */
    {w:"one",   j:"いち",   e:"1️⃣"},{w:"two",   j:"に",     e:"2️⃣"},
    {w:"three", j:"さん",   e:"3️⃣"},{w:"four",  j:"よん",   e:"4️⃣"},
    {w:"five",  j:"ご",     e:"5️⃣"},{w:"six",   j:"ろく",   e:"6️⃣"},
    {w:"seven", j:"なな",   e:"7️⃣"},{w:"eight", j:"はち",   e:"8️⃣"},
    {w:"nine",  j:"きゅう", e:"9️⃣"},{w:"ten",   j:"じゅう", e:"🔟"},
    {w:"red",   j:"あか",   e:"🔴"},{w:"blue",  j:"あお",   e:"🔵"},
    {w:"yellow",j:"きいろ", e:"🟡"},{w:"green", j:"みどり", e:"🟢"},
    {w:"white", j:"しろ",   e:"⬜"},{w:"black", j:"くろ",   e:"⬛"},
    {w:"pink",  j:"ぴんく", e:"🩷"},{w:"orange",j:"おれんじ",e:"🟠"},
    {w:"purple",j:"むらさき",e:"🟣"},{w:"brown", j:"ちゃいろ",e:"🟤"},
    {w:"circle",j:"まる",   e:"⭕"},{w:"triangle",j:"さんかく",e:"🔺"},
    {w:"square",j:"しかく", e:"🟦"},{w:"star",  j:"ほし",   e:"⭐"},
    {w:"heart", j:"ハート", e:"❤️"},
  ],
  2:[ /* 動物15 + 食べ物・飲み物21 = 36 */
    {w:"dog",    j:"いぬ",         e:"🐶"},{w:"cat",    j:"ねこ",       e:"🐱"},
    {w:"bird",   j:"とり",         e:"🐦"},{w:"fish",   j:"さかな",     e:"🐟"},

function buildQ(mode,lv){
  if(mode==='add'){
    if(lv===5) return shuffle([...ADD_ST]).slice(0,10).map(q=>({...q,isStory:true,type:'add'}));
    // 連続で同じ問題（a+b）が出ないよう生成
    return (()=>{
      const qs=[]; let prev=null;
      for(let i=0;i<10;i++){
        let q,retry=0;
        do{ q=genAdd(lv); retry++; }while(prev!==null && q.ans===prev.ans && q.a===prev.a && retry<30);
        qs.push(q); prev=q;
      }
      return qs;
    })();
  }
  if(mode==='sub'){
    if(lv===5) return shuffle([...SUB_ST]).slice(0,10).map(q=>({...q,isStory:true,type:'sub'}));
    // 連続で同じ問題（a-b）が出ないよう生成
    return (()=>{
      const qs=[]; let prev=null;
      for(let i=0;i<10;i++){
        let q,retry=0;
        do{ q=genSub(lv); retry++; }while(prev!==null && q.ans===prev.ans && q.a===prev.a && retry<30);
        qs.push(q); prev=q;
      }
      return qs;
    })();
  }
  if(mode==='eng') return shuffle([...ENG[lv]]).slice(0,10);
  if(mode==='kan') return shuffle([...KAN[lv]]).slice(0,10);
  if(mode==='clk'){
    // 連続で同じ時刻が出ないよう生成
    return (()=>{
      const qs=[]; let prev=null;
      for(let i=0;i<10;i++){
        let q,retry=0;
        do{ q=genClock(lv); retry++; }while(prev!==null && q.label===prev.label && retry<30);
        qs.push(q); prev=q;
      }
      return qs;
    })();
  }
}

function genAdd(lv){
  let a,b,tries=0;
  if(lv===1){
    do{ a=rn(1,9); b=rn(1,9); }while(a+b>9 && tries++<200);
    if(a+b>9){a=2;b=3;}
  }
  else if(lv===2){
    do{ a=rn(2,9); b=rn(2,9); }while((a+b<10||a+b>18) && tries++<200);
    if(a+b<10){a=7;b=5;}
  }
  else if(lv===3){
    a=rn(10,30); b=rn(0,9);
  }
  else{
    a=rn(10,20); b=rn(10,20);
  }
  const hasCarry=(a%10+b%10>=10);
  return{a,b,ans:a+b,sp:`${nj(a)} たす ${nj(b)} は？`,isStory:false,type:'add',e:'⭐',hasCarry};
}
function genSub(lv){
  let a,b,tries=0;
  if(lv===1){
    do{ a=rn(2,9); b=rn(1,a-1); }while(tries++<200&&false);
    // just pick valid pair
    b=rn(1,a-1);
  }
  else if(lv===2){
    // 2けた(11-20) - 1けた、繰り下がりなし、答えは2けた(>=10)
    do{ a=rn(11,20); b=rn(1,9); }while((a%10<b||a-b<10) && tries++<200);
    if(a%10<b||a-b<10){a=15;b=3;}
  }
  else if(lv===3){
    // 2けた(11-19) - 1けた、繰り下がりあり、答えは1けた
    do{ a=rn(11,19); b=rn(2,9); }while((a%10>=b||a-b>9||a-b<1) && tries++<200);
    if(a%10>=b||a-b>9||a-b<1){a=13;b=8;}
  }
  else{
    do{ a=rn(10,20); b=rn(10,a); }while(a<b && tries++<200);
    if(a<b){a=20;b=10;}
  }
  const hasBorrow=(lv===3)||(lv===4&&(a%10)<(b%10));
  return{a,b,ans:a-b,sp:`${nj(a)} ひく ${nj(b)} は？`,isStory:false,type:'sub',e:'⭐',hasBorrow};
}

// ============================================================
// START / RETRY QUIZ
// ============================================================
function startQuiz(mode,lv){
  CM=mode; CL=lv;
  QS=buildQ(mode,lv); QI=0; SS=0; ANS=false;
  $('pfill').style.background=MC[mode].pcol;
  scr('scr-qz');
  renderQ();
}

// ============================================================
// RENDER QUESTION
// ============================================================
function renderQ(){
  ANS=false; CQ=QS[QI];
  $('pfill').style.width=(QI/10*100)+'%';
  $('ptxt').textContent=`${QI+1} / 10`;
  $('qpts').textContent=`${SS}てん`;
  $('qcard').innerHTML='';
  $('choices').innerHTML='';

  // card top accent color
  $('qcard').style.setProperty('--add', MC[CM].pcol);
  $('qcard').style.cssText=$('qcard').style.cssText; // force repaint

  if(CM==='eng') buildEng();
  else if(CM==='kan') buildKan();
  else if(CM==='clk') buildClock();
  else buildMath();
}

// ── ENGLISH ──
function buildEng(){
  const q=CQ;
  const pool=ENG[CL];
  // Lv4/5はフレーズが長いため、同じLvの選択肢から選ぶ
  // distractorは正解と長さが近いものを優先（違和感を減らす）
  const wrongPool = pool.filter(x=>x.w!==q.w);
  const wrong = shuffle(wrongPool).slice(0,3);
  const opts=shuffle([{t:q.j,ok:true},...wrong.map(x=>({t:x.j,ok:false}))]);

  $('qcard').innerHTML=`
    <div class="q-label">えいごをきいて！にほんごは？</div>
    <div class="q-main" id="eng-emoji" style="font-size:78px;min-height:90px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s">
      ${q.e}
    </div>
    <div class="q-sub" style="font-size:22px;font-weight:900">${q.w}</div>
    <div style="display:flex;gap:0;justify-content:center;flex-wrap:wrap">
      <button class="speak-btn" onclick="spEn('${esc(q.w)}')">🔊 きいて！</button>
      <button class="hint-btn" onclick="showEngHint()">💡 ヒント</button>
    </div>`;

  opts.forEach(o=>{
    const b=mk('button','ch');
    b.style.fontSize='17px';
    b.textContent=o.t;
    b.onclick=()=>ans(b,o.ok,q.j,q.e,q.w,'eng');
    $('choices').appendChild(b);
  });
  setTimeout(()=>spEn(q.w),500);
}

function showEngHint(){
  const el=$('eng-emoji');
  if(el){ el.style.opacity='1'; el.style.animation='popIn .4s ease'; }
  spJa('ヒントだよ！');
}

// ── KANJI ──
function buildKan(){
  const q=CQ;
  const opts=shuffle([{t:q.a,ok:true},...q.w.map(x=>({t:x,ok:false}))]);
  const isL4=(CL===4);
  const isL5=(CL===5);

  // Lv4: 文中の「漢字」を強調表示し「なんて読む？」を問う
  let questionHTML='';
  let labelText='';
  if(isL4){
    // 「山」にのぼる → 「山」を大きく赤く
    const disp=(q.q||'').replace(/「([^」]+)」/g,'<span style="color:var(--kan);font-size:1.3em;font-weight:900;text-decoration:underline wavy var(--kan)">$1</span>');
    questionHTML=`<div style="font-size:22px;font-weight:900;line-height:1.7;margin-bottom:4px">${disp}</div>
    <div style="font-size:14px;color:#888;margin-bottom:4px">↑ この かんじは なんて よむ？</div>`;
    labelText=(q.q||'').replace(/「|」/g,'')+'の かんじは なんて よむ？';
  } else if(isL5){
    questionHTML=`<div style="font-size:19px;font-weight:900;white-space:pre-line;line-height:1.7">${q.q}</div>`;
    labelText=q.q;
  } else {
    questionHTML=`<div class="q-main" style="font-size:76px;font-weight:900">${q.q}</div>`;
    labelText='このかんじはなんてよむ？';
  }

  $('qcard').innerHTML=`
    <div class="q-label">${isL4||isL5?'よみかたはどれ？':'このかんじはなんてよむ？'}</div>
    ${questionHTML}
    <div style="display:flex;gap:0;justify-content:center;flex-wrap:wrap">
      <button class="speak-btn" onclick="spJa('${esc(labelText)}')">🔊 よんで！</button>
      <button class="hint-btn" onclick="showKanHint('${q.e}')">💡 ヒント</button>
    </div>
    <div class="kan-extra" id="kanex"></div>`;

  opts.forEach(o=>{
    const b=mk('button','ch');
    b.style.fontSize='18px';
    b.textContent=o.t;
    b.onclick=()=>ansKan(b,o.ok,q);
    $('choices').appendChild(b);
  });
}

function showKanHint(emoji){
  const ex=$('kanex');
  if(ex){
    ex.classList.add('show');
    ex.style.textAlign='center';
    ex.innerHTML='<span style="font-size:64px;display:block;animation:popIn .4s ease">'+emoji+'</span>';
  }
}

function ansKan(btn,ok,q){
  if(ANS)return; ANS=true;
  if(ok){
    btn.classList.add('ok');
    document.querySelectorAll('.ch').forEach(b=>{ if(b!==btn) b.disabled=true; });
    SS++; TS++; $('total-star').textContent=TS;
    showFB(true);
    playCorrectSFX(); zeztzReact(true);
    recordKanjiMaster((q.q||'').replace(/[「」\n]/g,'').trim()||q.q||'');
    // 元のコードと同じ構造：spJa(q.a)とshowEpopKan(q.e)を並行、
    // 両方終わったら説明文表示→spJa(q.exs)→nextQ
    Promise.all([spJa(q.a), showEpopKan(q.e)]).then(()=>{
      document.querySelectorAll('.hint-btn').forEach(b=>b.style.display='none');
      const ex=$('kanex');
      if(ex&&q.ex){
        ex.classList.add('show');
        ex.innerHTML=`💡 ${q.ex}`;
        setTimeout(()=>spJa(q.exs||q.ex).then(nextQ), 200);
      } else {
        nextQ();
      }
    });
  } else {
    showFB(false);
    playWrongSFX(); zeztzReact(false);
    btn.classList.add('ng');
    btn.disabled=true;
    spJa('もういちどやってみよう！').then(()=>{
      btn.classList.remove('ng');
      btn.disabled=false;
      ANS=false;
    });
  }
}

// ── MATH ──
function buildMath(){
  const q=CQ;
  const isAdd=(q.type==='add');

  if(q.isStory){
    $('qcard').innerHTML=`
      <div class="q-label">${isAdd?'たしざん':'ひきざん'}のもんだい</div>
      <div class="q-story">${(q.t||'').replace(/\n/g,'<br>')}</div>
      <div style="font-size:32px;font-weight:900;margin-top:8px;color:${MC[CM].pcol}">＝ ？</div>
      <button class="speak-btn" onclick="spJa('${esc((q.t||'').replace(/\n/g,' '))}')">🔊 よんで！</button>`;
    setTimeout(()=>spJa((q.t||'').replace(/\n/g,' ')),500);
  } else {
    const sign=isAdd?'＋':'－';
    const showDots=CL<=2&&q.a<=15&&q.b<=10;
    let dotsH='';
    if(showDots){
      const da=Array.from({length:q.a}).map(()=>'<span style="font-size:19px">🔵</span>').join('');
      const db=Array.from({length:q.b}).map(()=>'<span style="font-size:19px">🟡</span>').join('');
      dotsH=`<div class="q-dots">${da}</div>`;
      if(isAdd) dotsH+=`<div style="font-size:22px;font-weight:900;margin:2px 0">＋</div><div class="q-dots">${db}</div>`;
    }
    const showHint=(q.hasCarry===true)||(q.hasBorrow===true);
    $('qcard').innerHTML=`
      <div class="q-label">${isAdd?'たしざん':'ひきざん'}</div>
      ${dotsH}
      <div class="q-math" style="color:${MC[CM].pcol}">${q.a} ${sign} ${q.b} ＝ ？</div>
      <div style="display:flex;gap:0;justify-content:center;flex-wrap:wrap">
        <button class="speak-btn" onclick="spJa('${esc(q.sp)}')">🔊 よんで！</button>
        ${showHint?`<button class="hint-btn" onclick="showHint(${q.a},${q.b},'${q.type}')">💡 ヒント</button>`:''}
      </div>
      <div class="hint-box" id="hbox"></div>`;
    setTimeout(()=>spJa(q.sp||''),400);
  }
  buildMathOpts(q);
}

// ── MATH OPTIONS ──
function buildMathOpts(q){
  const ans=q.ans;
  const ws=new Set(); let tries=0;
  while(ws.size<3&&tries<120){
    tries++;
    const d=(rn(1,5))*(Math.random()<.5?1:-1);
    const w=ans+d;
    if(w>=0&&w<=30&&w!==ans) ws.add(w);
  }
  shuffle([ans,...ws]).forEach(c=>{
    const b=mk('button','ch');
    b.style.fontSize='28px'; b.style.fontWeight='900';
    b.textContent=c;
    b.onclick=()=>ans2(b,c===ans,ans,q.e||'⭐',String(ans));
    $('choices').appendChild(b);
  });
}

function ans(btn,ok,correctText,emoji,correctSp,mode){
  if(ANS)return; ANS=true;
  if(ok){
    // 正解：緑ハイライト・褒め・次へ
    btn.classList.add('ok');
    document.querySelectorAll('.ch').forEach(b=>{ if(b!==btn) b.disabled=true; });
    SS++; TS++; $('total-star').textContent=TS;
    showFB(true);
    playCorrectSFX(); zeztzReact(true);
    const sp=mode==='eng'?spEn(correctSp):spJa(praise());
    // 英語モードは絵文字エリアに、それ以外は画面中央に表示
    const epopTarget = mode==='eng' ? 'eng-emoji' : null;
    Promise.all([sp, showEpop(emoji, epopTarget)]).then(nextQ);
  } else {
    // 不正解：赤フラッシュのみ→音声→リセットして再挑戦
    btn.classList.add('ng');
    btn.disabled=true;
    showFB(false);
    playWrongSFX(); zeztzReact(false);
    spJa('もういちどやってみよう！').then(()=>{
      btn.classList.remove('ng');
      btn.disabled=false;
      ANS=false;
    });
  }
}

function genClock(lv){
  const pad=n=>String(n).padStart(2,'0');
  let h,m,s=0;
  if(lv===1){h=rn(1,12);m=rn(0,5)*10;}
  else if(lv===2){h=rn(1,12);m=rn(0,11)*5;}
  else if(lv===3){h=rn(1,12);m=rn(0,59);}
  else if(lv===4){h=rn(1,12);m=rn(0,59);s=rn(0,59);}
  else{h=rn(0,23);m=rn(0,59);}

  let label;
  if(lv===4) label=`${h}じ${pad(m)}ふん${pad(s)}びょう`;
  else if(lv===5) label=`${pad(h)}じ${pad(m)}ふん（24じかん）`;
  else label=`${h}じ${pad(m)}ふん`;

  // Generate 3 wrong answers
  const wrong=new Set(); let t=0;
  while(wrong.size<3&&t<120){
    t++;
    let wh=h,wm=m,ws=s;
    const which=rn(0,lv>=4?2:1);
    const d=rn(1,3);
    if(which===0){wh=(h+d-1)%12+1;}
    else if(which===1){wm=(m+(lv<=2?d*5:d)+60)%60;}
    else{ws=(s+d*10+60)%60;}
    let wl;
    if(lv===4) wl=`${wh}じ${pad(wm)}ふん${pad(ws)}びょう`;
    else if(lv===5) wl=`${pad(wh)}じ${pad(wm)}ふん（24じかん）`;
    else wl=`${wh}じ${pad(wm)}ふん`;
    if(wl!==label) wrong.add(wl);
  }
  const choices=shuffle([label,...[...wrong]]);
  return{h,m,s,lv,label,choices,type:'clk',e:'🕐'};
}

function buildHourHint(q){
  const h = q.h % 12 || 12;
  const hPrev = h; // 時針が指す時
  const hNext = h % 12 + 1; // 次の時
  const mFrac = (q.m + (q.lv>=4?q.s/60:0)) / 60;
  // 時針の位置をSVGで表現
  const W=160, cx=80, cy=80, R=70;
  const toA = f => (f*2*Math.PI) - Math.PI/2;

  // 前後の数字の位置
  const aH    = toA(h/12);
  const aHnext= toA(hNext/12);
  const hFrac = (h + mFrac) / 12;
  const aHand = toA(hFrac);

  const px=(r,a)=>cx+r*Math.cos(a);
  const py=(r,a)=>cy+r*Math.sin(a);

  // 時針の説明: 「h と h+1 のあいだ → h じ」
  const msg = mFrac < 0.5
    ? `みじかいはりは「${hPrev}」と「${hNext}」のあいだ<br>まだ「${hNext}」にとどいていないので <b style="color:#FF6B35;font-size:16px">${hPrev}じ</b>！`
    : `みじかいはりは「${hPrev}」と「${hNext}」のほぼまんなか<br>まだ「${hNext}」にとどいていないので <b style="color:#FF6B35;font-size:16px">${hPrev}じ</b>！`;

  return `
  <div style="background:#FFF3E0;border:2px solid #FFB74D;border-radius:14px;padding:10px 12px;margin-bottom:8px">
    <div style="font-size:12px;font-weight:900;color:#E65100;margin-bottom:6px">⏰ みじかいはり（じしん）</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <svg width="${W}" height="${W}" viewBox="0 0 ${W} ${W}" style="flex-shrink:0">
        <!-- 文字盤 -->
        <circle cx="${cx}" cy="${cy}" r="${R}" fill="#FFFDE7" stroke="#5D4037" stroke-width="3"/>
        <!-- h と h+1 の数字を強調 -->
        ${[...Array(12)].map((_,i)=>{
          const n=i+1, a=toA(n/12);
          const isH=n===hPrev, isN=n===hNext;
          const col=isH?'#FF6B35':isN?'#5C6BC0':'#9E9E9E';
          const fs=isH||isN?15:11;
          const fw=isH||isN?'900':'400';
          return `<text x="${px(55,a)}" y="${py(55,a)}" text-anchor="middle" dominant-baseline="middle" font-size="${fs}" font-weight="${fw}" fill="${col}">${n}</text>`;
        }).join('')}
        <!-- h と h+1 の間を扇形ハイライト -->
        <path d="M${cx},${cy} L${px(R-2,aH)},${py(R-2,aH)} A${R-2},${R-2} 0 0,1 ${px(R-2,aHnext)},${py(R-2,aHnext)} Z"
              fill="#FF6B35" opacity=".15"/>
        <!-- 時針 -->
        <line x1="${cx}" y1="${cy}" x2="${px(42,aHand)}" y2="${py(42,aHand)}"
              stroke="#3E2723" stroke-width="5" stroke-linecap="round"/>
        <!-- 中心 -->
        <circle cx="${cx}" cy="${cy}" r="4" fill="#3E2723"/>
        <!-- h ラベル -->
        <circle cx="${px(55,aH)}" cy="${py(55,aH)}" r="12" fill="#FF6B35" opacity=".25"/>
        <!-- h+1 ラベル -->
        <circle cx="${px(55,aHnext)}" cy="${py(55,aHnext)}" r="12" fill="#5C6BC0" opacity=".2"/>
      </svg>
      <div style="font-size:13px;font-weight:700;color:#4E342E;line-height:1.8">${msg}</div>
    </div>
  </div>`;
}

function buildMinuteHint(q){
  const lv=q.lv;
  const m=q.m;
  const unit = lv<=2?5:(lv<=3?1:1);

  if(lv===1){
    // 10分単位: 0,10,20,30,40,50の6目盛りをアニメ

  } else {

      <div style="font-size:12px;font-weight:900;color:#3949AB;margin-bottom:6px">⏰ ながいはり（ふんしん）</div>

function animateMinuteHint(q){
  const svg=document.getElementById('min-hint-svg');
  if(!svg) return;
  const lv=q.lv, m=q.m;
  const msg=document.getElementById('min-hint-msg');

  if(lv===1){
    // 10分単位: 横並びのマス目アニメ
    const steps=[0,10,20,30,40,50];
    const W=300, cellW=44, startX=10, y=40;
    steps.forEach((v,i)=>{
      const x=startX+i*cellW;
      const isCurrent=(v===m);
      const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x',x); rect.setAttribute('y',y-16);
      rect.setAttribute('width',cellW-4); rect.setAttribute('height',32); rect.setAttribute('rx',8);
      rect.setAttribute('fill', isCurrent?'#5C6BC0':'#C5CAE9');
      rect.setAttribute('opacity','0');
      rect.style.transition=`opacity 0.3s ease ${i*0.15}s`;
      svg.appendChild(rect);

      const text=document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x',x+cellW/2-2); text.setAttribute('y',y+7);
      text.setAttribute('text-anchor','middle');
      text.setAttribute('font-size', isCurrent?18:14);
      text.setAttribute('font-weight','900');
      text.setAttribute('fill', isCurrent?'white':'#3949AB');
      text.setAttribute('opacity','0');
      text.style.transition=`opacity 0.3s ease ${i*0.15}s`;
      text.textContent=v;
      svg.appendChild(text);

      // 矢印（最後以外）
      if(i<steps.length-1){
        const arr=document.createElementNS('http://www.w3.org/2000/svg','text');
        arr.setAttribute('x',x+cellW-2); arr.setAttribute('y',y+6);
        arr.setAttribute('font-size',14); arr.setAttribute('fill','#9FA8DA');
        arr.setAttribute('opacity','0');
        arr.style.transition=`opacity 0.3s ease ${i*0.15+0.1}s`;
        arr.textContent='→';
        svg.appendChild(arr);
      }
      setTimeout(()=>{ rect.setAttribute('opacity','1'); text.setAttribute('opacity','1'); }, 50);
    });
    if(msg) msg.innerHTML=`ながいはりが「<b style="color:#5C6BC0">${m}</b>」のところ → <b style="font-size:16px;color:#5C6BC0">${m}ふん</b>！`;

  } else if(lv===2){
    // 5分単位: 5,10,15...の横並びアニメ（2行表示）
    const steps=[0,5,10,15,20,25,30,35,40,45,50,55];
    const cellW=24, row1=steps.slice(0,6), row2=steps.slice(6);
    [[row1,15],[row2,52]].forEach(([row,baseY])=>{
      row.forEach((v,i)=>{
        const x=8+i*cellW+((row===row2)?6:0);
        const isCurrent=(v===m);
        const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
        rect.setAttribute('x',x); rect.setAttribute('y',baseY);
        rect.setAttribute('width',cellW-3); rect.setAttribute('height',22); rect.setAttribute('rx',5);
        rect.setAttribute('fill',isCurrent?'#5C6BC0':'#C5CAE9');
        rect.setAttribute('opacity','0');
        const delay=(row===row2?6:0)+i;
        rect.style.transition=`opacity 0.25s ease ${delay*0.1}s`;
        svg.appendChild(rect);
        const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
        txt.setAttribute('x',x+cellW/2-1); txt.setAttribute('y',baseY+15);
        txt.setAttribute('text-anchor','middle');
        txt.setAttribute('font-size',isCurrent?13:11);
        txt.setAttribute('font-weight','900');
        txt.setAttribute('fill',isCurrent?'white':'#3949AB');
        txt.setAttribute('opacity','0');
        txt.style.transition=`opacity 0.25s ease ${delay*0.1}s`;
        txt.textContent=v;
        svg.appendChild(txt);
        setTimeout(()=>{ rect.setAttribute('opacity','1'); txt.setAttribute('opacity','1'); },50);
      });
    });
    if(msg) msg.innerHTML=`ながいはりが「<b style="color:#5C6BC0">${m}</b>」のところ → <b style="font-size:16px;color:#5C6BC0">${m}ふん</b>！`;

  } else {
    // 1分単位: 時計盤に分の数字を順番にカウントアニメ
    const W=200, cx=100, cy=100, R=86;
    const toA=f=>(f*2*Math.PI)-Math.PI/2;
    const px=(r,a)=>cx+r*Math.cos(a);
    const py=(r,a)=>cy+r*Math.sin(a);
    const ns='http://www.w3.org/2000/svg';

    // 文字盤背景
    const bg=document.createElementNS(ns,'circle');
    bg.setAttribute('cx',cx); bg.setAttribute('cy',cy); bg.setAttribute('r',R);
    bg.setAttribute('fill','#EDE7F6'); bg.setAttribute('stroke','#7986CB'); bg.setAttribute('stroke-width','3');
    svg.appendChild(bg);

    // 5分ごとの数字（0=60,5,10...55）
    const fiveMarks=[0,5,10,15,20,25,30,35,40,45,50,55];
    fiveMarks.forEach(v=>{
      const a=toA(v/60);
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',px(70,a)); t.setAttribute('y',py(70,a));
      t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle');
      t.setAttribute('font-size','11'); t.setAttribute('font-weight','700');
      t.setAttribute('fill', v===m?'#3949AB':'#9FA8DA');
      t.textContent=v||'0';
      svg.appendChild(t);
    });

    // 分針
    const mFrac=(m+(q.lv>=4?q.s/60:0))/60;
    const mAngle=toA(mFrac);
    const hand=document.createElementNS(ns,'line');
    hand.setAttribute('x1',cx); hand.setAttribute('y1',cy);
    hand.setAttribute('x2',px(75,mAngle)); hand.setAttribute('y2',py(75,mAngle));
    hand.setAttribute('stroke','#5C6BC0'); hand.setAttribute('stroke-width','3.5');
    hand.setAttribute('stroke-linecap','round');
    svg.appendChild(hand);

    // 現在の分をハイライト
    const dot=document.createElementNS(ns,'circle');
    dot.setAttribute('cx',px(70,toA(m/60))); dot.setAttribute('cy',py(70,toA(m/60)));
    dot.setAttribute('r','8'); dot.setAttribute('fill','#5C6BC0'); dot.setAttribute('opacity','0.35');
    svg.appendChild(dot);

    // 中心
    const center=document.createElementNS(ns,'circle');
    center.setAttribute('cx',cx); center.setAttribute('cy',cy);
    center.setAttribute('r','5'); center.setAttribute('fill','#3949AB');
    svg.appendChild(center);

    // カウントアニメ: 0→m まで数字を増やす
    if(msg){
      let count=0;
      const tick=()=>{
        msg.innerHTML=`かぞえると… <b style="color:#5C6BC0;font-size:18px">${count}</b>ふん`;
        if(count<m){ count++; setTimeout(tick, m>20?60:100); }
        else msg.innerHTML=`ながいはりは <b style="color:#5C6BC0;font-size:20px">${m}ふん</b> をさしているよ！`;
      };
      setTimeout(tick,400);
    }
  }
}

function drawClock(q){
  const cv=document.getElementById('clk-cv');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  const W=180,cx=90,cy=90,R=82;
  ctx.clearRect(0,0,W,W);

  // 角度ヘルパー：時計の何分(0-60相当)→ラジアン
  // 0分=12時=真上=-PI/2  3時=0  6時=PI/2  9時=PI/-PI
  // deg: 0分=0°→ -90° オフセット後 → angle = (min/60)*2PI - PI/2
  const toAngle = frac => (frac * 2 * Math.PI) - Math.PI / 2;
  // 座標変換 (中心から距離r、角度a)
  const px=(r,a)=>cx + r*Math.cos(a);
  const py=(r,a)=>cy + r*Math.sin(a);

  // Face
  ctx.beginPath();ctx.arc(cx,cy,R,0,2*Math.PI);
  const gr=ctx.createRadialGradient(cx-20,cy-20,5,cx,cy,R);
  gr.addColorStop(0,'#FFFDE7');gr.addColorStop(1,'#FFF8E1');
  ctx.fillStyle=gr;ctx.fill();
  ctx.strokeStyle='#5D4037';ctx.lineWidth=4;ctx.stroke();

  // 目盛り・数字（1〜12）
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=1;i<=12;i++){
    const a = toAngle(i/12);          // i=12 → toAngle(1)=2PI-PI/2=3PI/2 → 真上✓
    // 数字
    ctx.font='bold 13px Zen Maru Gothic,sans-serif';
    ctx.fillStyle='#4E342E';
    ctx.fillText(String(i), px(66,a), py(66,a));
    // 目盛り
    const r1=i%3===0?74:78;
    ctx.beginPath();
    ctx.moveTo(px(r1,a), py(r1,a));
    ctx.lineTo(px(R,a),  py(R,a));
    ctx.strokeStyle=i%3===0?'#5D4037':'#BCAAA4';
    ctx.lineWidth=i%3===0?2.5:1.2;
    ctx.stroke();
  }
  // 分目盛り（5の倍数以外）
  for(let i=0;i<60;i++){
    if(i%5===0)continue;
    const a=toAngle(i/60);
    ctx.beginPath();
    ctx.moveTo(px(79,a), py(79,a));
    ctx.lineTo(px(R,a),  py(R,a));
    ctx.strokeStyle='#D7CCC8';ctx.lineWidth=1;ctx.stroke();
  }

  // 時針
  const hFrac=((q.h%12)+q.m/60+(q.lv>=4?q.s/3600:0))/12;
  drawHand(ctx,cx,cy,toAngle(hFrac),48,6,'#3E2723');

  // 分針
  const mFrac=(q.m+(q.lv>=4?q.s/60:0))/60;
  drawHand(ctx,cx,cy,toAngle(mFrac),68,4,'#5D4037');

  // 秒針（Lv4以上）
  if(q.lv>=4){
    const sFrac=q.s/60;
    drawHand(ctx,cx,cy,toAngle(sFrac),74,1.5,'#FF6B35');
    drawHand(ctx,cx,cy,toAngle(sFrac)+Math.PI,14,1.5,'#FF6B35');
  }

  // 中心点
  ctx.beginPath();ctx.arc(cx,cy,5,0,2*Math.PI);ctx.fillStyle='#3E2723';ctx.fill();
  if(q.lv>=4){ctx.beginPath();ctx.arc(cx,cy,3,0,2*Math.PI);ctx.fillStyle='#FF6B35';ctx.fill();}
}

function drawHand(ctx,cx,cy,angle,len,width,color){
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(cx + len*Math.cos(angle), cy + len*Math.sin(angle));
  ctx.strokeStyle=color;ctx.lineWidth=width;ctx.lineCap='round';ctx.stroke();
}

// TTS
// ============================================================
// TTS: returns Promise that resolves when speech ends (or immediately if no TTS)
// ============================================================
// TTS — Google翻訳TTS（自然な日本語）+ フォールバック
// ============================================================

// Google翻訳TTSでAudioを再生してPromiseを返す
// ★ 呼び出し前に必ず前の音声を止めてからPromiseを生成し、
//   resolve は必ず「読み上げ完了後」にのみ発火する
window._ttsQueue = Promise.resolve(); // 直列化キュー

function googleTTS(text, lang){
  return new Promise(resolve=>{
    const maxLen = 180;
    const chunks = [];
    let s = text;
    while(s.length > 0){ chunks.push(s.slice(0,maxLen)); s=s.slice(maxLen); }

    let i=0;
    function playNext(){
      if(i>=chunks.length){ resolve(); return; }
      const url='https://translate.googleapis.com/translate_tts?ie=UTF-8&tl='+lang
               +'&client=tw-ob&q='+encodeURIComponent(chunks[i]);
      const audio=new Audio(url);
      audio.volume=1;
      // onerror と play().catch の二重呼び出しを防ぐフラグ
      let failed=false;
      function onFail(){
        if(failed) return; failed=true;
        fallbackTTS(chunks[i], lang).then(()=>{ i++; playNext(); });
      }
      audio.onended=()=>{ i++; playNext(); };
      audio.onerror=onFail;
      if(window._currentAudio){ try{window._currentAudio.pause();}catch(e){} }
      window._currentAudio=audio;
      audio.play().catch(onFail);
    }
    playNext();
  });
}

// フォールバック: ブラウザ内蔵 Web Speech API
function fallbackTTS(text, lang){
  return new Promise(resolve=>{
    if(!window.speechSynthesis){ resolve(); return; }
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;
    u.rate=lang.startsWith('ja')?0.85:0.82;
    u.pitch=1.1;
    u.volume=1;
    const vs=speechSynthesis.getVoices();
    if(lang.startsWith('ja')){
      const fv=vs.find(v=>v.lang.startsWith('ja')&&/female|woman|kyoko|haruka/i.test(v.name))
             ||vs.find(v=>v.lang.startsWith('ja'));
      if(fv) u.voice=fv;
    } else {
      const fv=vs.find(v=>v.lang.startsWith('en')&&/female|woman|samantha|karen/i.test(v.name))
             ||vs.find(v=>v.lang.startsWith('en'));
      if(fv) u.voice=fv;
    }
    // onend/onerror 二重発火防止
    let done=false;
    u.onend=()=>{ if(!done){done=true;resolve();} };
    u.onerror=()=>{ if(!done){done=true;resolve();} };
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  });
}

function spJa(t){ return googleTTS(t,'ja'); }
function spEn(t){ return googleTTS(t,'en'); }

}

// ============================================================
// BGM — 明るくポップな子ども向けBGM（小音量・音声に被らない）
// ============================================================
let audioCtx=null, bgmNodes=[], bgmPlaying=false, bgmMaster=null;

// BGM全体の音量（小さめ：音声に被らないよう 0.08）
const BGM_VOL=0.08;

function initAudio(){
  if(audioCtx) return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  // マスターゲイン（BGM専用）
  bgmMaster=audioCtx.createGain();
  bgmMaster.gain.value=BGM_VOL;
  bgmMaster.connect(audioCtx.destination);
}

// Key: C major（明るく元気）, 120BPM（子ども向け）
const BPM=120, BAR=4*60/BPM;

// ノート生成（bgmMasterに接続）
function note(freq,start,dur,vol=1.0,wave='triangle'){
  if(!audioCtx)return;
  // BGM用: bgmMasterがあればそこへ、なければ直接destinationへ
  const dest=bgmMaster||audioCtx.destination;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type=wave;
  osc.frequency.value=freq;
  gain.gain.setValueAtTime(0,start);
  gain.gain.linearRampToValueAtTime(vol,start+0.015);
  gain.gain.setValueAtTime(vol,start+dur-0.03);
  gain.gain.linearRampToValueAtTime(0,start+dur);
  osc.connect(gain);
  gain.connect(dest);
  osc.start(start);osc.stop(start+dur+0.05);
  bgmNodes.push(osc);
}

// 軽いドラム（bgmMasterに接続）
function drum(start,type='kick'){
  if(!audioCtx||!bgmMaster)return;
  const len=audioCtx.sampleRate*(type==='kick'?0.15:0.08);
  const buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  if(type==='kick'){
    for(let i=0;i<d.length;i++) d[i]=Math.sin(2*Math.PI*80*Math.pow(1-i/d.length,2))*(1-i/d.length);
  } else if(type==='snare'){
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.7)*0.6;
  } else {
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2)*0.3;
  }
  const src=audioCtx.createBufferSource();
  const gain=audioCtx.createGain();
  src.buffer=buf;
  gain.gain.value=type==='kick'?1.2:type==='snare'?0.7:0.4;
  src.connect(gain);
  gain.connect(bgmMaster);
  src.start(start);
  bgmNodes.push(src);
}

// ── 音符定義 (C major) ──
const N={
  C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,
  C5:523,D5:587,E5:659,F5:698,G5:784,A5:880,B5:988,
  G3:196,C3:131,F3:175,A3:220,
};

function scheduleBGM(){
  if(!audioCtx||!bgmPlaying)return;
  if(audioCtx.state==='suspended')return; // suspend中は再スケジュールしない
  bgmNodes.forEach(n=>{try{n.stop&&n.stop()}catch(e){}});
  bgmNodes=[];

  const t=audioCtx.currentTime+0.05;
  const q=BAR/4;  // 四分音符
  const e=q/2;    // 八分音符
  const s=e/2;    // 十六分音符
  const h=q*2;    // 二分音符

  // ────────────────────────────────────
  // MELODY — 明るくはずむ子どもポップ（Cメジャー）
  // ドレミっぽい親しみやすいフレーズ
  // ────────────────────────────────────
  const mel=[
    // フレーズA（8小節）: 上がって下がる元気なメロ
    [N.C5,e],[N.E5,e],[N.G5,e],[N.E5,e],   // ソミドミ
    [N.D5,e],[N.F5,e],[N.E5,q],             // レファミ
    [N.C5,e],[N.D5,e],[N.E5,e],[N.G5,e],   // ドレミソ
    [N.A5,q],[N.G5,h],                      // ラソー
    // フレーズB
    [N.G5,e],[N.E5,e],[N.D5,e],[N.C5,e],
    [N.E5,e],[N.D5,e],[N.C5,q],
    [N.G4,e],[N.A4,e],[N.B4,e],[N.C5,e],
    [N.D5,q],[N.C5,h],
    // フレーズA'（くり返し）
    [N.C5,e],[N.E5,e],[N.G5,e],[N.E5,e],
    [N.D5,e],[N.F5,e],[N.E5,q],
    [N.C5,e],[N.D5,e],[N.E5,e],[N.G5,e],
    [N.A5,q],[N.G5,h],
    // フレーズC（盛り上がり）
    [N.E5,s],[N.F5,s],[N.G5,e],[N.A5,e],[N.G5,e],
    [N.F5,e],[N.E5,e],[N.D5,q],
    [N.E5,s],[N.D5,s],[N.C5,e],[N.D5,e],[N.E5,e],
    [N.G5,q],[N.C5,h],
  ];
  let mt=t;
  mel.forEach(([f,d])=>{ if(f>0) note(f,mt,d*0.78,0.9,'triangle'); mt+=d; });

  // ────────────────────────────────────
  // BASS — ルートを刻む軽いベース
  // ────────────────────────────────────
  const bassLine=[
    N.C3,N.C3,N.F3,N.F3,
    N.C3,N.C3,N.G3,N.G3,
    N.C3,N.C3,N.F3,N.F3,
    N.A3,N.A3,N.G3,N.C3,
  ];
  let btt=t;
  for(let rep=0;rep<2;rep++){
    bassLine.forEach(f=>{ note(f,btt,q*0.6,0.7,'sine'); btt+=q; });
  }

  // ────────────────────────────────────
  // CHORD PAD — やわらかい和音
  // ────────────────────────────────────
  const pads=[
    [[N.C4,N.E4,N.G4],h],
    [[N.F3,N.A3,N.C4],h],
    [[N.C4,N.E4,N.G4],h],
    [[N.G3,N.B3||N.C4,N.D4],h],
  ];
  let pt=t;
  for(let rep=0;rep<4;rep++){
    pads.forEach(([chs,d])=>{ chs.forEach(f=>note(f,pt,d*0.85,0.35,'sine')); pt+=d; });
  }

  // ────────────────────────────────────
  // GLOCKENSPIEL風アルペジオ — キラキラ感
  // ────────────────────────────────────
  const glk=[N.C5,N.E5,N.G5,N.C6||N.B5,N.G5,N.E5,N.C5,N.E5];
  const C6=N.C5*2;
  const glk2=[N.C5,N.E5,N.G5,C6,N.G5,N.E5,N.C5,N.E5];
  let gt=t;
  for(let rep=0;rep<8;rep++){
    (rep%2===0?glk2:glk).forEach(f=>{ note(f,gt,e*0.55,0.5,'sine'); gt+=e; });
  }

  // ────────────────────────────────────
  // DRUMS — 軽快なリズム
  // ────────────────────────────────────
  for(let b=0;b<8;b++){
    const bt=t+b*BAR;
    // キック: 1・3拍
    drum(bt,      'kick');
    drum(bt+q*2,  'kick');
    // スネア: 2・4拍
    drum(bt+q,    'snare');
    drum(bt+q*3,  'snare');
    // ハイハット: 8分音符
    for(let i=0;i<8;i++) drum(bt+i*e,'hihat');
  }

  const totalDur=8*BAR;
  setTimeout(scheduleBGM,(totalDur-0.4)*1000);
}

function toggleBGM(){
  initAudio();
  if(audioCtx.state==='suspended') audioCtx.resume();
  bgmPlaying=!bgmPlaying;
  const btn=$('bgm-btn');
  if(bgmPlaying){
    btn.textContent='🎵 BGM OFF';
    btn.style.background='linear-gradient(135deg,#e94560,#c0392b)';
    scheduleBGM();
  } else {
    btn.textContent='🎵 BGM ON';
    btn.style.background='linear-gradient(135deg,#1a1a2e,#16213e)';
    bgmNodes.forEach(n=>{try{n.stop&&n.stop(audioCtx.currentTime+0.05)}catch(e){}});
    bgmNodes=[];
  }
}

// ── 効果音（マスターゲインとは別に直接出力：音声に被らない程度の小音量）──
function playCorrectSFX(){
  initAudio();
  if(audioCtx.state==='suspended') audioCtx.resume();
  const t=audioCtx.currentTime;
  // キラキラ上昇音
  [[N.E5,.08],[N.G5,.08],[N.C6||N.B5,.12]].forEach(([f,d],i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(0,t+i*.07);
    g.gain.linearRampToValueAtTime(0.18,t+i*.07+0.01);
    g.gain.linearRampToValueAtTime(0,t+i*.07+d);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(t+i*.07);o.stop(t+i*.07+d+.05);
  });
}
function playWrongSFX(){
  initAudio();
  if(audioCtx.state==='suspended') audioCtx.resume();
  const t=audioCtx.currentTime;
  // 直接destinationへ（bgmMasterを経由しない）
  [[180,0,.18,.15],[140,.1,.18,.12]].forEach(([f,delay,d,v])=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sawtooth';o.frequency.value=f;
    g.gain.setValueAtTime(0,t+delay);
    g.gain.linearRampToValueAtTime(v,t+delay+0.01);
    g.gain.linearRampToValueAtTime(0,t+delay+d);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(t+delay);o.stop(t+delay+d+.05);
  });
}

// GUGUGAGA PENGUIN CHARACTER SYSTEM
// ============================================================
const GUGU_PRAISE=['ぐぐがが〜！すごい！','やったね！ぐぐがが！','かんぺき！ぐぐがが〜♪','てんさい！ぐぐがが！','さいこう！ぐぐ〜！','ぐぐがが〜！かなとすごい！'];
const GUGU_RETRY=['ぐぐ…もういちど！','がが！がんばれ！','ぐぐがが、あきらめないで！','もう一回！ぐぐ！'];
const GUGU_HELLO=['ぐぐがが〜！','いっしょにがんばろう！ぐぐ！','ぐぐがが！かなとー！','がが〜！きょうも元気？','ぐぐ！まなぼう！'];

// ぐぐがが かわいい声 (TikTok風: 高くてやわらか、ビブラート付き)
function playGuguGaga(variant){
  initAudio();
  if(!audioCtx) return;
  if(audioCtx.state==='suspended') audioCtx.resume();
  const t = audioCtx.currentTime;

  // ─────────────────────────────────────────────────────
  // ググガガの実際の音声を分析した特徴:
  //  ・超高音 (800〜1100Hz) — ほぼ小鳥の鳴き声レベル
  //  ・「ぐ」= 短くぽっと鳴る、少し低め、ブレス感
  //  ・「が」= 高く伸びる、語尾が上がる
  //  ・全体的に「ぐ↑ぐ↑ がぁ↑〜 がぁ↑〜」と上昇
  //  ・速いビブラート (9〜12Hz) でぷるぷる
  //  ・短い音符間に無音ギャップ（ぷつぷつ感）
  // ─────────────────────────────────────────────────────

  // 音を1つ鳴らす関数
  function chirp(startT, f0, f1, dur, vol, vibHz, vibDepth){
    // メイン発振 (sine: やわらかい)
    const osc  = audioCtx.createOscillator();
    const env  = audioCtx.createGain();
    osc.type   = 'sine';
    // 音程: f0から始まりf1へ上昇（鳥っぽい尻上がり）
    osc.frequency.setValueAtTime(f0, startT);
    osc.frequency.linearRampToValueAtTime(f1, startT + dur * 0.6);
    osc.frequency.linearRampToValueAtTime(f1 * 0.97, startT + dur);
    // エンベロープ: 素早くアタック→サステイン→フェードアウト
    env.gain.setValueAtTime(0, startT);
    env.gain.linearRampToValueAtTime(vol, startT + 0.012);
    env.gain.setValueAtTime(vol * 0.9, startT + dur - 0.03);
    env.gain.linearRampToValueAtTime(0, startT + dur);
    osc.connect(env); env.connect(audioCtx.destination);
    osc.start(startT); osc.stop(startT + dur + 0.02);

    // ビブラート (速め・ぷるぷる)
    const lfo     = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.type      = 'sine';
    lfo.frequency.value  = vibHz;
    lfoGain.gain.value   = vibDepth;
    lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
    lfo.start(startT + 0.03); lfo.stop(startT + dur + 0.02);

    // 2倍音 (小さく: 鳥声の倍音成分)
    const osc2  = audioCtx.createOscillator();
    const env2  = audioCtx.createGain();
    osc2.type   = 'triangle';
    osc2.frequency.setValueAtTime(f0 * 2, startT);
    osc2.frequency.linearRampToValueAtTime(f1 * 2, startT + dur * 0.6);
    env2.gain.setValueAtTime(0, startT);
    env2.gain.linearRampToValueAtTime(vol * 0.12, startT + 0.015);
    env2.gain.linearRampToValueAtTime(0, startT + dur);
    osc2.connect(env2); env2.connect(audioCtx.destination);
    osc2.start(startT); osc2.stop(startT + dur + 0.02);
  }

  if(variant === 'happy'){
    // 正解: 「ぐぐっ！ がぁ〜！ がぁ〜！」元気よく上昇
    chirp(t + 0.00, 820, 900,  0.10, 0.28, 11, 22);  // ぐ
    chirp(t + 0.13, 860, 940,  0.10, 0.26, 11, 22);  // ぐ
    chirp(t + 0.27, 980,1100,  0.20, 0.32, 10, 28);  // がぁ〜
    chirp(t + 0.52,1050,1180,  0.22, 0.30, 10, 30);  // がぁ〜！(最高音)
  } else if(variant === 'sad'){
    // 不正解: 「ぐぅ…がぁ…」少し低めしょんぼり
    chirp(t + 0.00, 650, 680,  0.16, 0.20,  8, 14);  // ぐぅ
    chirp(t + 0.20, 620, 660,  0.16, 0.18,  7, 12);  // ぐぅ
    chirp(t + 0.40, 720, 740,  0.22, 0.22,  8, 16);  // がぁ

function guguTalk(side){
  const txt = GUGU_HELLO[Math.floor(Math.random()*GUGU_HELLO.length)];
  showGuguSpeech(txt, side);
  playGuguGaga('normal');
  spawnHeart(side);
}

function showGuguSpeech(txt, side){
  const sp=$('gugu-speech');
  sp.textContent=txt;
  sp.style.display='block';
  sp.style.bottom='95px';
  if(side==='left'){
    sp.style.left='8px'; sp.style.right='auto';
    sp.style.borderRadius='18px 18px 18px 4px';
  } else {
    sp.style.right='8px'; sp.style.left='auto';
    sp.style.borderRadius='18px 18px 4px 18px';
  }
  clearTimeout(sp._t);
  sp._t=setTimeout(()=>{ sp.style.display='none'; },2800);
}

function zeztzReact(ok){  // 後方互換のためzeztzReactのまま
  const txt = ok
    ? GUGU_PRAISE[Math.floor(Math.random()*GUGU_PRAISE.length)]
    : GUGU_RETRY[Math.floor(Math.random()*GUGU_RETRY.length)];
  const side = Math.random()<.5?'left':'right';
  showGuguSpeech(txt, side);
  playGuguGaga(ok?'happy':'sad');
  if(ok) spawnHeart(side);
}

function spawnHeart(side){
  const h=document.createElement('div');
  h.className='gugu-heart';
  h.textContent=['💗','💕','✨','⭐','🌟'][Math.floor(Math.random()*5)];
  h.style.cssText=`bottom:80px;${side==='right'?'right:30px':'left:30px'};`;
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),950);
}

// ── goHomeに記録表示を統合 ──
function renderStudyRecord(){
  const rec=$('study-record');
  if(!rec) return;

  // ── 学習記録 ──
  const modeInfo={
    add:{name:'たしざん',col:'var(--add)',ic:'➕'},
    sub:{name:'ひきざん',col:'var(--sub)',ic:'➖'},
    eng:{name:'えいご',  col:'var(--eng)',ic:'🔤'},
    kan:{name:'かんじ',  col:'var(--kan)',ic:'漢'},
    clk:{name:'とけい',  col:'var(--clk)',ic:'🕐'},
  };
  let cards='';
  Object.entries(modeInfo).forEach(([mode,info])=>{
    const maxL=REC.maxLv[mode]||0;
    const pct=(maxL/5)*100;
    let detail='';
    if(mode==='kan'){
      const n=Object.keys(REC.kanjiMastered).length;
      detail=`かんじ ${n}/80もじ`;
    } else {
      detail=maxL>0?`Lv${maxL} クリア！`:'まだちょうせんしていないよ';
    }
    const lvText=maxL>=5?'ぜんぶクリア🏆':maxL>0?`Lv${maxL} クリア`:'---';
    cards+=`<div class="rec-card" style="border-color:${info.col}44">
      <div class="rec-mode" style="color:${info.col}">${info.ic} ${info.name}</div>
      <div class="rec-lv" style="color:${info.col}">${lvText}</div>
      <div class="rec-bar-wrap"><div class="rec-bar" style="width:${pct}%;background:${info.col}"></div></div>
      <div class="rec-detail">${detail}</div>
    </div>`;
  });
  rec.innerHTML=`<div class="rec-title">📊 がくしゅうきろく</div><div class="rec-grid">${cards}</div>`;

}

  ];
  const crackPath = cracks[Math.min(crackStage, 4)];

  // 光彩の色
  const glowColors = { 'egg-glow-morning':'#FFDD55', 'egg-glow-day':'#50B4FF', 'egg-glow-evening':'#FF6633', 'egg-glow-night':'#9955FF' };

  return `<svg width="80" height="96" viewBox="0 0 80 96" xmlns="http://www.w3.org/2000/svg">

}

// 卵ウィジェット描画
function renderEggWidget(){
  initEggState();
  const e = REC.eggs;
  const idx = e.currentEggIdx;
  const stars = e.starsInCurrentEgg;
  const pct = Math.min(100, (stars / EGG_STARS_NEEDED) * 100);
  const crackStage = stars===0?0 : stars<8?1 : stars<16?2 : stars<22?3 : 4;
  const timeGlow = getTimeGlowClass();

  const wrap = $('egg-svg-wrap');
  if(wrap){
    wrap.innerHTML = drawEggSVG(idx, crackStage, timeGlow);
    wrap.className = ''; // reset
    // グロークラスはSVG側で対応済みなのでここでは不要
  }

  const nameEl = $('egg-char-name');
  if(nameEl) nameEl.textContent = `⭐${stars} / ${EGG_STARS_NEEDED}こ あつめると…`;

  const barEl = $('egg-bar');
  if(barEl) barEl.style.width = pct + '%';

  const labelEl = $('egg-bar-label');
  if(labelEl){
    const rem = EGG_STARS_NEEDED - stars;
    labelEl.textContent = rem>0 ? `あと⭐${rem}こで われる！` : 'もうすぐわれる！！';
  }

  renderEggCollection();
}

// コレクション表示
function renderEggCollection(){
  const grid = $('ecol-grid');
  if(!grid) return;
  const collected = (REC.eggs && REC.eggs.collected) || [];
  let html = '';
  EGG_CHARS.forEach((c,i)=>{
    const got = collected.includes(i);
    html += `<div class="ecol-item${got?'':' locked'}" title="${got?c.name+'「'+c.msg+'」':'？？？'}" onclick="ecollTap(${i},${got})">
      <span class="ecol-no">${i+1}</span>
      ${got ? c.char : '❓'}
    </div>`;
  });
  grid.innerHTML = html;
}

// コレクションアイテムタップ
function ecollTap(i, got){
  if(!got) return;
  const c = EGG_CHARS[i];
  spJa(c.name + '！' + c.msg);
  // ぷるぷる
  const items = document.querySelectorAll('.ecol-item');
  const el = items[i];
  if(el){ el.style.animation='none'; void el.offsetWidth; el.style.animation='popIn .4s ease'; }
}

// 卵タップ（ぷるぷる）
function eggTap(){
  const wrap = $('egg-svg-wrap');
  if(!wrap) return;
  wrap.classList.remove('wobble');
  void wrap.offsetWidth;
  wrap.classList.add('wobble');
  setTimeout(()=>wrap.classList.remove('wobble'), 600);
  // ランダムセリフ
  const lines=['がんばってね！','もうすぐわれるよ！','なかにだれがいるかな？','たのしみにしてて！','ぽかぽかあたためてね！'];
  spJa(lines[Math.floor(Math.random()*lines.length)]);
}

// スター追加時に卵に反映
function addStarToEgg(n){
  initEggState();
  REC.eggs.starsInCurrentEgg += n;
  saveRecord();
  // 割れるか判定
  if(REC.eggs.starsInCurrentEgg >= EGG_STARS_NEEDED){
    setTimeout(()=>hatchEgg(), 600);
  }
}

// 割れる演出
function hatchEgg(){
  initEggState();
  const e = REC.eggs;
  const idx = e.currentEggIdx;
  const c = EGG_CHARS[idx];

  // コレクションに追加
  if(!e.collected.includes(idx)) e.collected.push(idx);

  // 次の卵をセット（まだ出ていないものを優先）
  const notCollected = EGG_CHARS.map((_,i)=>i).filter(i=>!e.collected.includes(i));
  e.currentEggIdx = notCollected.length > 0
    ? notCollected[Math.floor(Math.random()*notCollected.length)]
    : Math.floor(Math.random()*EGG_CHARS.length);
  e.starsInCurrentEgg = 0;
  saveRecord();

  // ポップアップ表示
  $('ehp-char').textContent = c.char;
  $('ehp-name').textContent = c.name;
  $('ehp-msg').textContent  = c.msg;
  $('ehp-title').textContent = '🎉 うまれた！！';
  $('ehp-sub').textContent   = 'たまごから とびだしたよ！';
  $('egg-hatch-popup').classList.add('show');
  confetti();
  spJa('やったー！たまごがわれた！' + c.name + 'だよ！' + c.msg);
  renderEggWidget();
}

function closeEggHatch(){
  $('egg-hatch-popup').classList.remove('show');
}

// ── スター加算 & 進化チェック ──
function addStar(n=1){
  REC.totalStars += n;
  saveRecord();
  addStarToEgg(n);
}


// ── クリア記録 ──
function recordClear(mode, lv, score){
  if(score>=7){  // 7問以上正解でクリア
    if(!REC.cleared[mode]||!REC.cleared[mode][lv]){
      if(!REC.cleared[mode]) REC.cleared[mode]={};
      REC.cleared[mode][lv]=true;
      REC.maxLv[mode]=Math.max(REC.maxLv[mode]||0, lv);
      saveRecord();
    }
  }
}

// ── 漢字習得記録 ──
function recordKanjiMaster(kanji){
  if(!REC.kanjiMastered[kanji]){
    REC.kanjiMastered[kanji]=true;
    saveRecord();
  }
}


// ============================================================
// ② タブ非表示・最小化時にBGM・音声を一時停止
// ============================================================
// BGMを完全停止するヘルパー（scheduleBGMの再スケジュールも防ぐ）
function suspendBGM(){
  if(audioCtx){
    bgmNodes.forEach(n=>{try{n.stop&&n.stop(audioCtx.currentTime+0.02)}catch(e){}});
    bgmNodes=[];
    try{ audioCtx.suspend(); }catch(e){}
  }
}
function resumeBGM(){
  if(bgmPlaying && audioCtx){
    audioCtx.resume().then(()=>scheduleBGM()).catch(()=>{});
  }
}

document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    suspendBGM();
    if(window.speechSynthesis) speechSynthesis.cancel();
    if(window._currentAudio){ try{window._currentAudio.pause();}catch(e){} }
  } else {
    resumeBGM();
  }
});
window.addEventListener('blur',()=>{
  suspendBGM();
  if(window.speechSynthesis) speechSynthesis.cancel();
  if(window._currentAudio){ try{window._currentAudio.pause();}catch(e){} }
});
window.addEventListener('focus',()=>{
  if(bgmPlaying && audioCtx){
    if(audioCtx.state==='suspended') audioCtx.resume();
    scheduleBGM();
  }
});

// ============================================================
// INIT
// ============================================================

function startApp(){
  const ss=document.getElementById('start-screen');
  if(!ss) return;

  // ── Androidタップ制限を解除：ダミー音を鳴らす ──
  initAudio();
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();

  // speechSynthesisをユーザージェスチャーで初期化
  if(window.speechSynthesis){
    speechSynthesis.getVoices();
    // ダミー発話（無音・超短）でUnlock
    const u=new SpeechSynthesisUtterance(' ');
    u.volume=0; u.lang='ja-JP'; u.rate=2;
    speechSynthesis.speak(u);
  }

  // Google TTSのAudio Unlockのためダミー再生
  try{
    const a=new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAA'+'EAAQARAAAAARAAAAAgACAFUNAAAQ');
    a.volume=0; a.play().catch(()=>{});
  }catch(e){}

  // アニメーションでフェードアウト
  ss.style.transition='opacity .6s ease';
  ss.style.opacity='0';
  setTimeout(()=>{
    ss.style.display='none';
    // ぐぐがが音を鳴らす（タップ後なのでOK）
    playGuguGaga('happy');
    goHome();
  }, 600);
}

// ── スタート画面：時間帯で背景・絵文字を変える ──
(function(){
  const ss=document.getElementById('start-screen');
  if(!ss) return;
  const h=new Date().getHours();
  let cls, emoji, msg;
  if(h>=5 && h<10){
    cls='time-morning'; emoji='🌅'; msg='おはよう！いっしょにべんきょうしよう！';
  } else if(h>=10 && h<17){
    cls='time-day'; emoji='☀️'; msg='たのしく まなぼう 🌟';
  } else if(h>=17 && h<20){
    cls='time-evening'; emoji='🌆'; msg='もうひとがんばり！いっしょにやろう！';
  } else {
    cls='time-night'; emoji='🌙'; msg='こんばんは！いっしょにべんきょうしよう！';
  }
  ss.classList.add(cls);
  const charEl=ss.querySelector('.start-char');
  if(charEl) charEl.textContent=emoji;
  const subEl=ss.querySelector('.start-sub');
  if(subEl) subEl.textContent=msg;
  if(cls==='time-morning'||cls==='time-day'){
    ss.querySelectorAll('.start-title').forEach(el=>{ el.style.color='#3D2B00'; });
    if(subEl) subEl.style.color='rgba(61,43,0,0.7)';
    const guguEl=ss.querySelector('.start-gugu');
    if(guguEl) guguEl.style.color='rgba(100,50,0,0.7)';
  }
})();
